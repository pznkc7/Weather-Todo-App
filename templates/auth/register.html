{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>Sign up — Skylist</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'weathersite/style.css' %}" />
</head>
<body>
  <nav class="nav">
    <div class="nav-logo"><span class="dot"></span>Skylist</div>
  </nav>

  <main class="dashboard" style="max-width:400px;">
    <div class="card">
      <div class="card-head"><h3>Create your account</h3></div>

      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem;">
          Sign up
        </button>
      </form>

      <p style="margin-top:1rem;font-size:0.85rem;color:var(--ink-soft);">
        Already have an account? <a href="{% url 'login' %}" style="color:var(--sky);">Log in</a>
      </p>
    </div>
  </main>
</body>
</html>
