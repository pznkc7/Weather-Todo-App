{% extends "weathersite/index.html" %}
{% load static %}

{% block content %}
<main class="container" style="max-width:400px; padding-top:4.5rem;">
  <div class="card">
    <div class="card-row"><h3>Log in</h3></div>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-error">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="post" class="stack">
      {% csrf_token %}
      <div class="field">
        <label>Username</label>
        <input class="input" type="text" name="username" required autofocus />
      </div>
      <div class="field">
        <label>Password</label>
        <input class="input" type="password" name="password" required />
      </div>
      <button type="submit" class="btn btn-primary btn-block">Log in</button>
    </form>

    <p style="margin-top:1.25rem; font-size:0.85rem; color:var(--ink-soft); text-align:center;">
      No account yet? <a href="{% url 'register' %}" style="color:var(--accent); font-weight:600;">Sign up</a>
    </p>
  </div>
</main>
{% endblock content %}
