{% extends "weathersite/index.html" %}
{% load static %}

{% block content %}
<main class="container" style="max-width:460px; padding-top:3rem;">
  <div class="card">
    <div class="card-row"><h3>Add a task</h3></div>

    <form method="post" class="stack">
      {% csrf_token %}
      <div class="field">
        <label>Title</label>
        <input class="input" type="text" name="title" placeholder="e.g. Submit report" required />
      </div>
      <div class="field">
        <label>Description (optional)</label>
        <textarea class="input" name="description" rows="3" placeholder="Any extra detail"></textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Add task</button>
    </form>
  </div>
</main>
{% endblock content %}
