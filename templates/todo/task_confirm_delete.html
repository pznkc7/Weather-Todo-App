{% extends "weathersite/index.html" %}
{% load static %}

{% block content %}
<main class="container" style="max-width:460px; padding-top:3rem;">
  <div class="card">
    <div class="card-row"><h3>Delete this task?</h3></div>
    <p style="color:var(--ink-soft); font-size:0.9rem; margin-bottom:1.25rem;">
      "{{ task.title }}" will be permanently removed. This can't be undone.
    </p>

    <form method="post" style="display:flex; gap:0.6rem;">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Yes, delete it</button>
      <a href="{% url 'todo:list' %}" class="btn btn-outline">Cancel</a>
    </form>
  </div>
</main>
{% endblock content %}
