{% extends "weathersite/index.html" %}
{% load static %}

{% block content %}
<main class="dashboard" style="max-width:480px;">
  <div class="card">
    <div class="card-head"><h3>Delete this task?</h3></div>
    <p style="color:var(--ink-soft); font-size:0.9rem;">"{{ task.title }}" will be permanently removed.</p>

    <form method="post" style="display:flex; gap:0.6rem; margin-top:1rem;">
      {% csrf_token %}
      <button type="submit" class="btn btn-primary" style="background:var(--storm-red, #FF6B6B);">
        Yes, delete it
      </button>
      <a href="{% url 'todo:list' %}" class="btn btn-ghost">Cancel</a>
    </form>
  </div>
</main>
{% endblock content %}
